<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Mini Amazon FBA{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="{% url 'catalog:product_list' %}">Mini Amazon</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
        <li class="nav-item"><a class="nav-link" href="{% url 'accounts:profile' %}">الملف الشخصي</a></li>
        {% if user.is_seller %}
        <li class="nav-item"><a class="nav-link" href="{% url 'stores:seller_dashboard' %}">لوحة التحكم</a></li>
        {% endif %}
        <li class="nav-item"><a class="nav-link" href="{% url 'orders:cart' %}">سلة التسوق</a></li>
        {% else %}
        <li class="nav-item"><a class="nav-link" href="{% url 'accounts:login' %}">تسجيل دخول</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'accounts:register' %}">تسجيل</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
