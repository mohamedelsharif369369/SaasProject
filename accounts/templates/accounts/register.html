{% extends "base.html" %}
{% block title %}تسجيل مستخدم جديد{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<h2 class="mb-3">تسجيل مستخدم جديد</h2>
<form method="post">
{% csrf_token %}
<div class="form-floating mb-2">
<input type="text" name="username" class="form-control" placeholder="اسم المستخدم" required>
<label>اسم المستخدم</label>
</div>
<div class="form-floating mb-2">
<input type="email" name="email" class="form-control" placeholder="البريد الإلكتروني" required>
<label>البريد الإلكتروني</label>
</div>
<div class="form-floating mb-2">
<input type="password" name="password1" class="form-control" placeholder="كلمة المرور" required>
<label>كلمة المرور</label>
</div>
<div class="form-floating mb-2">
<input type="password" name="password2" class="form-control" placeholder="تأكيد كلمة المرور" required>
<label>تأكيد كلمة المرور</label>
</div>
<button type="submit" class="btn btn-success w-100">تسجيل</button>
</form>
</div>
</div>
{% endblock %}
